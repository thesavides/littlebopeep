<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#16a34a"/>
  <!-- Sheep body (fluffy cloud shape) -->
  <ellipse cx="256" cy="248" rx="110" ry="88" fill="white"/>
  <circle cx="188" cy="220" r="60" fill="white"/>
  <circle cx="324" cy="220" r="60" fill="white"/>
  <circle cx="220" cy="190" r="56" fill="white"/>
  <circle cx="292" cy="190" r="56" fill="white"/>
  <circle cx="256" cy="178" r="52" fill="white"/>
  <!-- Head -->
  <ellipse cx="256" cy="308" rx="38" ry="42" fill="#e2e8f0"/>
  <!-- Eyes -->
  <circle cx="242" cy="300" r="5" fill="#1e293b"/>
  <circle cx="270" cy="300" r="5" fill="#1e293b"/>
  <!-- Nose -->
  <ellipse cx="256" cy="318" rx="8" ry="5" fill="#94a3b8"/>
  <!-- Legs -->
  <rect x="208" y="328" width="20" height="52" rx="8" fill="#e2e8f0"/>
  <rect x="240" y="328" width="20" height="52" rx="8" fill="#e2e8f0"/>
  <rect x="272" y="328" width="20" height="52" rx="8" fill="#e2e8f0"/>
  <!-- Ears -->
  <ellipse cx="220" cy="298" rx="14" ry="20" fill="#e2e8f0" transform="rotate(-20 220 298)"/>
  <ellipse cx="292" cy="298" rx="14" ry="20" fill="#e2e8f0" transform="rotate(20 292 298)"/>
</svg>
